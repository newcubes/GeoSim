<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sand Simulator - Click Test</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1a1a;
      }
      
      folk-sand {
        display: block;
        width: 100%;
        height: 100%;
      }
      
      .debug {
        position: fixed;
        top: 10px;
        left: 10px;
        background: rgba(0, 0, 0, 0.8);
        color: white;
        padding: 10px;
        font-family: monospace;
        font-size: 12px;
        z-index: 1000;
        max-width: 300px;
      }
    </style>
  </head>
  <body>
    <div class="debug" id="debug">
      <div>Click on canvas to test</div>
      <div id="status">Waiting...</div>
    </div>

    <folk-sand id="sand"></folk-sand>

    <script type="module">
      import '@folkjs/labs/standalone/folk-sand';

      const sandElement = document.getElementById('sand');
      const debugDiv = document.getElementById('debug');
      const statusDiv = document.getElementById('status');
      
      // Set initial material to sand (4)
      sandElement.setMaterialType(4);
      
      // Monitor pointer events
      const canvas = sandElement.shadowRoot?.querySelector('canvas');
      if (canvas) {
        canvas.addEventListener('pointerdown', (e) => {
          statusDiv.textContent = `Pointer DOWN at (${e.clientX}, ${e.clientY})`;
          console.log('Pointer down event:', e);
        });
        
        canvas.addEventListener('pointermove', (e) => {
          if (e.buttons > 0) {
            statusDiv.textContent = `Dragging at (${e.clientX}, ${e.clientY})`;
          }
        });
        
        canvas.addEventListener('pointerup', (e) => {
          statusDiv.textContent = `Pointer UP`;
        });
      }
      
      // Monitor material changes
      sandElement.onMaterialChange = (material) => {
        console.log('Material changed to:', material);
        statusDiv.textContent = `Material: ${material}`;
      };
      
      // Log initialization
      console.log('Sand element initialized:', sandElement);
      console.log('Canvas:', canvas);
    </script>
  </body>
</html>
